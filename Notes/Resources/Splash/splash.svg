<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
	<defs>
		<style>
			.background {
			fill: #0F1419;
			}
			.icon-shadow {
			filter: drop-shadow(0 10px 30px rgba(106, 255, 202, 0.2));
			}
			.title-text {
			font-family: Arial, sans-serif;
			font-size: 48px;
			font-weight: bold;
			fill: #FFFFFF;
			text-anchor: middle;
			}
		</style>
	</defs>

	<!-- Фон -->
	<rect class="background" width="512" height="512"/>

	<!-- Иконка приложения в центре -->
	<g class="icon-shadow" transform="translate(256, 200)">
		<svg viewBox="0 0 200 200" width="200" height="200" x="-100" y="-100">
			<!-- Основная иконка (упрощённая версия) -->
			<defs>
				<linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
					<stop offset="0%" style="stop-color:#6affca;stop-opacity:1" />
					<stop offset="100%" style="stop-color:#99d7e9;stop-opacity:1" />
				</linearGradient>
			</defs>

			<!-- Закруглённый квадрат для фона иконки -->
			<rect x="20" y="20" width="160" height="160" rx="40" fill="url(#grad1)" opacity="0.9"/>

			<!-- Линии (символизирующие заметки) -->
			<line x1="50" y1="60" x2="150" y2="60" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
			<line x1="50" y1="95" x2="150" y2="95" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
			<line x1="50" y1="130" x2="120" y2="130" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
		</svg>
	</g>

	<!-- Название приложения внизу -->
	<text class="title-text" x="256" y="420">Заметки</text>
</svg>